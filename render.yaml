services:
  - type: web
    name: world-dog-statistics-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PORT
        value: 3000
      - key: ADMIN_API_KEY
        sync: false
